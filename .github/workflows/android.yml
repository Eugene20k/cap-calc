name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        uses: GearSnd/buildozer-action@v1
        with:
          command: buildozer android debug
      - name: Save
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
