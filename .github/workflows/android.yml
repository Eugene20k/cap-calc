name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show all files
        run: ls -R
      - name: Install Legacy Libs
        run: |
          wget http://azure.archive.ubuntu.com/ubuntu/pool/universe/n/ncurses/libtinfo5_6.2-0ubuntu2_amd64.deb
          sudo apt install ./libtinfo5_6.2-0ubuntu2_amd64.deb
      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git python3-dev libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev zlib1g-dev openjdk-17-jdk cmake libffi-dev libssl-dev
          pip install --upgrade pip
          pip install buildozer cython==0.29.33
      - name: Build APK
        run: |
          # Ищем файл в любой папке и переходим туда
          SPEC_FILE=$(find . -name "buildozer.spec" -print -quit)
          if [ -z "$SPEC_FILE" ]; then
            echo "Файл buildozer.spec НЕ НАЙДЕН!"
            exit 1
          fi
          cd $(dirname "$SPEC_FILE")
          sed -i 's/# android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
          buildozer android debug
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: "**/bin/*.apk"
